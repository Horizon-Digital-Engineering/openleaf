# Nissan Leaf AZE0 Generation (2013-2017)
# Compatible Years: 2013, 2014, 2015, 2016, 2017
# Battery Capacities: 24 kWh (2013-2015), 30 kWh (2016-2017 "Lizard")
# Chemistry: AESC LMO (24kWh) or LG Chem NCM (30kWh)
# Cell Configuration: Always 96s2p (96 cell pairs, 192 total cells)
# CAN Access: Direct via OBD-II pins 12/13 (no gateway blocking)

metadata:
  generation: "AZE0"
  years: [2013, 2014, 2015, 2016, 2017]
  battery_capacities:
    - capacity_kwh: 24
      chemistry: "AESC LMO"
      max_gids: 281
      years: [2013, 2014, 2015]
    - capacity_kwh: 24
      chemistry: "AESC LMO Lizard"
      max_gids: 281
      years: [2015, 2016, 2017]
    - capacity_kwh: 30
      chemistry: "LG Chem NCM"
      max_gids: 356
      years: [2016, 2017]
  can_bus:
    type: "Car-CAN"
    baud_rate: 500000
    access: "Direct OBD-II (pins 12/13)"

# ==============================================================================
# BROADCAST FRAMES (Passive Monitoring - No Polling Required)
# ==============================================================================
broadcast_frames:
  # Battery pack voltage, current, and usable SOC
  - id: 0x1DB
    name: "Battery Voltage & Current"
    bus: "Car-CAN"
    interval_ms: 100  # 10 Hz
    length: 8
    signals:
      - key: "pack_current"
        start_bit: 0
        length: 11
        signed: true
        scale: 0.5
        unit: "A"
        description: "Battery current (negative=charging, positive=discharging)"
      - key: "pack_voltage"
        start_bit: 16
        length: 10
        scale: 0.5
        unit: "V"
        description: "Total pack voltage"
      - key: "soc_display"
        start_bit: 32
        length: 7
        scale: 1.0
        unit: "%"
        description: "Usable state of charge shown on dash"

  # Battery capacity, temperature, and health
  - id: 0x5BC
    name: "Battery Capacity & Temperature"
    bus: "Car-CAN"
    interval_ms: 100  # 10 Hz (changed from 500ms in ZE0!)
    length: 8
    signals:
      - key: "gids"
        start_bit: 0
        length: 10
        scale: 1.0
        unit: "GIDs"
        description: "Remaining capacity in 80Wh increments"
      - key: "charge_bars"
        start_bit: 20
        length: 4
        scale: 1.0
        unit: "bars"
        description: "Battery capacity bars (0-12)"
      - key: "pack_temp_avg"
        start_bit: 24
        length: 8
        scale: 1.0
        offset: -40.0
        unit: "C"
        description: "Average battery pack temperature"
      - key: "soh"
        start_bit: 33
        length: 7
        scale: 1.0
        unit: "%"
        description: "State of health (capacity deterioration rate)"

  # State of Health (alternative source on CAR-CAN)
  - id: 0x5B3
    name: "State of Health"
    bus: "Car-CAN"
    interval_ms: 500  # 2 Hz
    length: 8
    signals:
      - key: "soh_alt"
        byte_offset: 1
        byte_length: 1
        formula: "value >> 1"
        unit: "%"
        description: "SOH from byte shift method"
      - key: "stored_energy_gids"
        byte_offset: 5
        byte_length: 1
        scale: 1.0
        unit: "GIDs"
        description: "Stored energy (multiply by 80 for Wh)"

  # Detailed SOC (10-bit precision)
  - id: 0x55B
    name: "Battery SOC Detailed"
    bus: "Car-CAN"
    interval_ms: 100  # 10 Hz
    length: 8
    signals:
      - key: "soc_precise"
        start_bit: 0
        length: 10
        scale: 0.1
        unit: "%"
        description: "Precise state of charge (0.1% resolution)"

  # Range and battery warnings
  - id: 0x5A9
    name: "Range & Warnings"
    bus: "Car-CAN"
    interval_ms: 100  # 10 Hz
    length: 8
    signals:
      - key: "range_km"
        start_bit: 8
        length: 12
        scale: 0.2
        unit: "km"
        formula: "(data[1] << 4) | (data[2] >> 4)"
        description: "Estimated range from instrument cluster (OVMS formula)"
      - key: "low_battery_warning"
        start_bit: 16
        length: 1
        scale: 1.0
        unit: "flag"
        description: "Low battery warning (0=off, 1=on)"
      - key: "critical_battery_warning"
        start_bit: 43
        length: 1
        scale: 1.0
        unit: "flag"
        description: "Critical battery warning"

  # Motor/Inverter status
  - id: 0x1DA
    name: "Motor & Inverter"
    bus: "Car-CAN"
    interval_ms: 100  # 10 Hz
    length: 8
    signals:
      - key: "motor_voltage"
        start_bit: 0
        length: 8
        scale: 2.0
        unit: "V"
        description: "Motor input voltage"
      - key: "motor_torque"
        start_bit: 18
        length: 11
        signed: true
        scale: 0.5
        unit: "Nm"
        description: "Motor effective torque"
      - key: "motor_rpm"
        start_bit: 39
        length: 15
        signed: true
        scale: 1.0
        unit: "rpm"
        description: "Motor output RPM"

  # Charger output power
  - id: 0x380
    name: "Charger Output"
    bus: "Car-CAN"
    interval_ms: 100  # 10 Hz
    length: 8
    signals:
      - key: "charger_power"
        start_bit: 16
        length: 9
        scale: 0.1
        unit: "kW"
        description: "Charger output power"
      - key: "ac_voltage"
        start_bit: 42
        length: 9
        scale: 0.5
        offset: 70.0
        unit: "V"
        description: "AC input voltage to charger"

  # J1772 / Quick Charge status
  - id: 0x5BF
    name: "J1772 / QC Status"
    bus: "Car-CAN"
    interval_ms: 100
    length: 8
    signals:
      - key: "j1772_current_limit"
        start_bit: 16
        length: 8
        scale: 0.5
        unit: "A"
        description: "J1772 pilot current limit"
      - key: "qc_voltage"
        start_bit: 24
        length: 8
        scale: 1.0
        offset: 257.0
        unit: "V"
        description: "Quick charge voltage"

  # Climate control / outside temp
  - id: 0x54C
    name: "Climate Control"
    bus: "Car-CAN"
    interval_ms: 100  # 10 Hz
    length: 8
    signals:
      - key: "outside_temp"
        start_bit: 48
        length: 8
        scale: 0.5
        offset: -40.0
        unit: "C"
        description: "Outside ambient temperature"

  # Inverter temperatures
  - id: 0x55A
    name: "Inverter Temperatures"
    bus: "Car-CAN"
    interval_ms: 100  # 10 Hz
    length: 8
    signals:
      - key: "motor_temp"
        start_bit: 32
        length: 8
        scale: 0.5
        unit: "C"
        description: "Motor temperature"
      - key: "igbt_temp"
        start_bit: 16
        length: 8
        scale: 0.5
        unit: "C"
        description: "IGBT (inverter) temperature"

# ==============================================================================
# ACTIVE QUERY PIDs (Diagnostic Requests via UDS Service 0x21)
# ==============================================================================
# NOTE: For SOH and SOC, use broadcast frames 0x5BC and 0x55B which are more
# reliable than UDS Group 1. Group 1 data has been found unreliable by the
# community (dalathegreat Battery-Emulator, jsphuebner stm32-car).
# ==============================================================================
query_pids:
  # Group 0x01 - Battery HX (internal resistance health)
  # Raw data analysis (after 61 01 header stripped):
  # Bytes 16-17: Battery HX value (divide by 102.4 to get percentage)
  # HX is a key battery health indicator: 100% = new, decreases with age
  # Example: 6236 / 102.4 = 60.9% HX for a 44% SOH battery
  - name: "Battery Health Data"
    request_id: 0x79B
    response_id: 0x7BB
    service: 0x21
    data_identifier: 0x01
    poll_interval_sec: 5.0
    multi_frame: true
    signals:
      # Battery HX at bytes 16-17 (value / 102.4 = percentage)
      - key: "battery_hx"
        byte_offset: 16
        byte_length: 2
        scale: 0.009765625  # 1/102.4
        unit: "%"
        description: "Battery HX (internal resistance health factor)"

  # Group 0x02 - All 96 cell voltages (48 pairs in 2S config)
  - name: "Cell Voltages"
    request_id: 0x79B
    response_id: 0x7BB
    service: 0x21
    data_identifier: 0x02
    poll_interval_sec: 5.0
    multi_frame: true
    continuation_required: true
    signals:
      - key: "cell_voltages"
        byte_offset: 0
        byte_length: 192  # 96 cells x 2 bytes each
        encoding: "array_u16_be"
        scale: 0.001
        unit: "V"
        description: "Array of all 96 cell pair voltages"

  # Group 0x03 - Cell voltage statistics
  # Raw data structure (after 61 03 header):
  # Bytes 0-1: FF FF (unknown)
  # Bytes 2-3: Some voltage or counter
  # Bytes 4-9: Additional data
  # Bytes 10-11: V_max (cell max voltage in mV)
  # Bytes 12-13: V_min (cell min voltage in mV)
  - name: "Cell Voltage Stats"
    request_id: 0x79B
    response_id: 0x7BB
    service: 0x21
    data_identifier: 0x03
    poll_interval_sec: 2.0
    multi_frame: true
    signals:
      - key: "cell_v_max"
        byte_offset: 10
        byte_length: 2
        scale: 0.001
        unit: "V"
        description: "Maximum cell voltage"
      - key: "cell_v_min"
        byte_offset: 12
        byte_length: 2
        scale: 0.001
        unit: "V"
        description: "Minimum cell voltage"

  # Group 0x04 - Temperature sensors (4 pack thermistors)
  # Raw data structure (after 61 04 header):
  # Each sensor has 3 bytes: 2-byte raw ADC + 1-byte interpreted temp in Celsius
  # Bytes 0-2: Sensor 1 (raw ADC at 0-1, temp at 2)
  # Bytes 3-5: Sensor 2 (raw ADC at 3-4, temp at 5)
  # Bytes 6-8: Sensor 3 (raw ADC at 6-7, temp at 8) - often 0xFF if not present
  # Bytes 9-11: Sensor 4 (raw ADC at 9-10, temp at 11)
  # NOTE: 0xFF (255) indicates sensor error or not present
  - name: "Pack Temperatures"
    request_id: 0x79B
    response_id: 0x7BB
    service: 0x21
    data_identifier: 0x04
    poll_interval_sec: 2.0
    multi_frame: true
    signals:
      - key: "temp_sensor_1"
        byte_offset: 2
        byte_length: 1
        scale: 1.0
        unit: "C"
        description: "Battery temperature sensor 1"
      - key: "temp_sensor_2"
        byte_offset: 5
        byte_length: 1
        scale: 1.0
        unit: "C"
        description: "Battery temperature sensor 2"
      - key: "temp_sensor_3"
        byte_offset: 8
        byte_length: 1
        scale: 1.0
        unit: "C"
        description: "Battery temperature sensor 3 (255 = not present)"
      - key: "temp_sensor_4"
        byte_offset: 11
        byte_length: 1
        scale: 1.0
        unit: "C"
        description: "Battery temperature sensor 4"

  # Group 0x06 - Cell balancing shunt status
  # Raw data: 24 bytes, each representing balancing status for ~4 cells
  # Values: 0x00 = not balancing, 0x01 = balancing, 0x04 = other status
  # For now, we extract the first few bytes as individual status indicators
  # TODO: Implement proper array parsing in decoder
  - name: "Cell Balancing Status"
    request_id: 0x79B
    response_id: 0x7BB
    service: 0x21
    data_identifier: 0x06
    poll_interval_sec: 10.0
    multi_frame: true
    signals:
      # First 4 cell balancing status bytes as a combined value
      # Can check individual cells by looking at the bits
      - key: "balancing_active"
        byte_offset: 0
        byte_length: 1
        scale: 1.0
        description: "Balancing status byte 1 (0=off, 1=on)"
